<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Lunavia & Usagi 🌙🐰</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 10px; color: #333; }
        .contenedor { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #4b0082; margin-top: 0; }
        .seccion { background: #fdfbff; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 15px; }
        label { font-weight: bold; font-size: 12px; display: block; margin-top: 8px; }
        input, select { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; width: 100%; margin-top: 10px; }
        .btn-add { background-color: #9c27b0; }
        
        #campo-molde { background: #e8f5e9; padding: 10px; border-radius: 8px; border: 1px dashed #4caf50; margin-top: 10px; display: none; }
        
        .item-prod { background: white; padding: 12px; border-radius: 10px; margin-top: 10px; border-left: 5px solid #9c27b0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tag-id { background: #4caf50; color: white; padding: 2px 6px; border-radius: 5px; font-size: 10px; font-weight: bold; }
        .btn-vender { background: #4caf50; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .alerta-stock { background: #ffebee; color: #c62828; padding: 5px; border-radius: 5px; font-size: 11px; font-weight: bold; margin-top: 5px; display: block; border: 1px solid #ef9a9a; }
    </style>
</head>
<body>

    <div class="contenedor">
        <h2>🛍️ Punto de Venta</h2>

        <div class="seccion">
            <h3>📦 Registrar Producto</h3>
            <label>Categoría:</label>
            <select id="pCat" onchange="mostrarIdMolde()">
                <option value="🌙 Lunavia">🌙 Lunavia</option>
                <option value="🐰 Usagi">🐰 Usagi</option>
                <option value="🪴 Moldes">🪴 Moldes</option>
            </select>

            <div id="campo-molde">
                <label>🆔 ID del Molde (Compra):</label>
                <input type="text" id="pID" placeholder="Ej. M-001">
            </div>

            <label>Nombre del Producto:</label>
            <input type="text" id="pNombre" placeholder="Nombre">
            
            <div style="display: flex; gap: 10px;">
                <div style="flex:1;"><label>Costo Compra $:</label><input type="number" id="pCosto" value="0"></div>
                <div style="flex:1;"><label>Precio Venta $:</label><input type="number" id="pPrecio" value="0"></div>
            </div>
            
            <label>Stock Inicial:</label>
            <input type="number" id="pStock" value="1">

            <button class="btn btn-add" onclick="registrar()">💾 Guardar Inventario</button>
        </div>

        <div id="inventario-lista"></div>

        <div style="text-align: center; margin-top: 20px;"><a href="index.html" style="color:#666; text-decoration:none; font-weight:bold;">⬅ Menú Principal</a></div>
    </div>

    <script>
        let productos = JSON.parse(localStorage.getItem('productos_pos')) || [];

        function mostrarIdMolde() {
            const cat = document.getElementById('pCat').value;
            document.getElementById('campo-molde').style.display = (cat === "🪴 Moldes") ? "block" : "none";
        }

        function registrar() {
            const cat = document.getElementById('pCat').value;
            const nom = document.getElementById('pNombre').value.trim();
            const costo = parseFloat(document.getElementById('pCosto').value) || 0;
            const precio = parseFloat(document.getElementById('pPrecio').value) || 0;
            const stock = parseInt(document.getElementById('pStock').value) || 0;
            const idM = document.getElementById('pID').value.trim();

            if(!nom) return alert("Ponle nombre al producto");

            productos.push({ 
                categoria: cat, 
                nombre: (cat === "🪴 Moldes" ? "MOLDE: " + nom : nom), 
                costo: costo,
                precio: precio, 
                stock: stock,
                moldeID: (cat === "🪴 Moldes" ? idM : "")
            });

            localStorage.setItem('productos_pos', JSON.stringify(productos));
            limpiar();
            dibujar();
            alert("✅ ¡Producto guardado!");
        }

        function dibujar() {
            const lista = document.getElementById('inventario-lista');
            lista.innerHTML = "<h3>📊 Inventario Actual</h3>";
            
            productos.forEach((p, i) => {
                const ganancia = p.precio - p.costo;
                lista.innerHTML += `
                <div class="item-prod" style="border-color: ${p.categoria.includes('Usagi') ? '#ff85a2' : '#9c27b0'}">
                    <strong>${p.nombre}</strong> <br>
                    <small>${p.categoria}</small> ${p.moldeID ? `<span class="tag-id">ID: ${p.moldeID}</span>` : ""}
                    <div style="font-size:12px; margin: 5px 0;">
                        <span>Costo: $${p.costo} | Venta: $${p.precio}</span><br>
                        <span style="color:green;">Ganancia: $${ganancia.toFixed(2)}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span>Stock: <strong>${p.stock}</strong></span>
                        <div style="display:flex; gap:5px;">
                            <button class="btn-vender" onclick="vender(${i})">🛍️ Venta</button>
                            <button onclick="borrar(${i})" style="border:none; background:none; color:red; cursor:pointer;">✕</button>
                        </div>
                    </div>
                    ${p.stock === 1 ? `<span class="alerta-stock">⚠️ ¡ÚLTIMA PIEZA! Resurtir pronto.</span>` : ""}
                    ${p.stock === 0 ? `<span class="alerta-stock" style="color:gray; border-color:#ccc;">🚫 AGOTADO</span>` : ""}
                </div>`;
            });
        }

        function vender(i) {
            if(productos[i].stock > 0) {
                productos[i].stock--;
                if(productos[i].stock === 1) {
                    alert("⚠️ ¡Atención! Solo queda 1 pieza de " + productos[i].nombre);
                }
                localStorage.setItem('productos_pos', JSON.stringify(productos));
                dibujar();
            } else {
                alert("¡Ya no tienes stock de este producto!");
            }
        }

        function borrar(i) {
            if(confirm("¿Segura que quieres borrarlo?")) {
                productos.splice(i, 1);
                localStorage.setItem('productos_pos', JSON.stringify(productos));
                dibujar();
            }
        }

        function limpiar() {
            document.getElementById('pNombre').value = "";
            document.getElementById('pCosto').value = "0";
            document.getElementById('pPrecio').value = "0";
            document.getElementById('pStock').value = "1";
            document.getElementById('pID').value = "";
        }

        window.onload = dibujar;
    </script>
</body>
</html>
