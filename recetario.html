<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recetario Maestro Lunavia & Usagi 🌙🐰</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfbff; padding: 10px; color: #333; }
        .contenedor { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #4b0082; margin-bottom: 20px; }
        .seccion { background: #f3e5f5; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #e1bee7; }
        .selector-material { background: #4b0082; padding: 15px; border-radius: 15px; color: white; margin-bottom: 15px; }
        label { font-weight: bold; font-size: 12px; display: block; margin-top: 8px; }
        input, select { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; color: white; }
        .btn-save { background: #4caf50; }
        .resultado-box { background: #fff; padding: 15px; border-radius: 12px; margin-top: 10px; border: 2px dashed #9c27b0; }
        .receta-card { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 12px; margin-top: 10px; border-left: 5px solid #9c27b0; }
        .badge-desglose { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-top: 8px; font-size: 12px; border: 1px solid #eee; line-height: 1.6; }
        h4 { margin: 5px 0; color: #4b0082; }
    </style>
</head>
<body>

<div class="contenedor">
    <h2>✨ Recetario Producción</h2>

    <div class="selector-material">
        <label style="color: white;">💎 Material a trabajar:</label>
        <select id="tipoMaterial" onchange="limpiarYCalcular()">
            <option value="vela">🕯️ Vela (Cera + Estearina + Esencia)</option>
            <option value="yeso">🗿 Yeso (Yeso + Agua + Resistol)</option>
            <option value="resina">💧 Resina (Comp. A + Comp. B)</option>
        </select>
    </div>

    <div class="seccion" style="background: #e1f5fe; border-color: #b3e5fc;">
        <h4>💧 1. Cálculo por Molde</h4>
        <div style="display: flex; gap: 5px;">
            <div style="flex:1;">
                <label>Molde con agua (g):</label>
                <input type="number" id="moldeAgua" placeholder="0" oninput="calcularPorAgua()">
            </div>
            <div style="flex:1;">
                <label>Molde vacío (g):</label>
                <input type="number" id="moldeVacio" placeholder="0" oninput="calcularPorAgua()">
            </div>
        </div>
    </div>

    <div class="seccion">
        <h4>🧪 2. Desglose de Mezcla</h4>
        <label>Peso total deseado (g):</label>
        <input type="number" id="pesoTotal" placeholder="Ej. 200" oninput="calcularMezcla()">
        
        <div id="controlesExtra"></div>

        <div class="resultado-box" id="resultadoCalculo">
            Esperando datos...
        </div>
    </div>

    <div class="seccion" style="background: #e8f5e9; border-color: #c8e6c9;">
        <h4>📝 3. Guardar en Bitácora</h4>
        <input type="text" id="nombreReceta" placeholder="Nombre de la pieza">
        <input type="text" id="notas" placeholder="Aroma, color o marca del material">
        <button class="btn btn-save" onclick="guardarReceta()">💾 Guardar Receta</button>
    </div>

    <div id="listaRecetas"></div>
    
    <div style="text-align:center; margin-top:20px;">
        <a href="index.html" style="color:#9c27b0; text-decoration:none; font-weight:bold; font-size:13px;">⬅ Menú Principal</a>
    </div>
</div>

<script>
    let recetas = JSON.parse(localStorage.getItem('recetas_final_v3')) || [];
    let textoDesgloseGlobal = "";

    function limpiarYCalcular() {
        document.getElementById('pesoTotal').value = "";
        calcularMezcla();
    }

    function calcularPorAgua() {
        const agua = parseFloat(document.getElementById('moldeAgua').value) || 0;
        const vacio = parseFloat(document.getElementById('moldeVacio').value) || 0;
        const mat = document.getElementById('tipoMaterial').value;
        const neto = agua - vacio;
        
        if (neto > 0) {
            let factor = 0.90; // Vela
            if (mat === 'yeso') factor = 1.50;
            if (mat === 'resina') factor = 1.10;
            
            document.getElementById('pesoTotal').value = (neto * factor).toFixed(1);
            calcularMezcla();
        }
    }

    function calcularMezcla() {
        const total = parseFloat(document.getElementById('pesoTotal').value) || 0;
        const mat = document.getElementById('tipoMaterial').value;
        const resBox = document.getElementById('resultadoCalculo');
        textoDesgloseGlobal = "";

        if (total <= 0) {
            resBox.innerText = "Ingresa un peso para desglosar.";
            return;
        }

        if (mat === 'vela') {
            const esencia = total * 0.10; // 10% esencia
            const base = total - esencia;
            const estearina = base * 0.10; // 10% estearina de la base
            const ceraPura = base - estearina;
            
            textoDesgloseGlobal = `• Cera: ${ceraPura.toFixed(1)}g<br>• Estearina: ${estearina.toFixed(1)}g<br>• Esencia: ${esencia.toFixed(1)}g`;
        } 
        else if (mat === 'yeso') {
            const agua = total * 0.30; // 30% agua
            const solido = total - agua;
            const resistol = total * 0.05; // 5% resistol
            const yesoPuro = solido - resistol;

            textoDesgloseGlobal = `• Yeso: ${yesoPuro.toFixed(1)}g<br>• Agua: ${agua.toFixed(1)}g<br>• Resistol: ${resistol.toFixed(1)}g`;
        }
        else if (mat === 'resina') {
            const compA = total * 0.60;
            const compB = total * 0.40;
            textoDesgloseGlobal = `• Componente A: ${compA.toFixed(1)}g<br>• Componente B: ${compB.toFixed(1)}g`;
        }

        resBox.innerHTML = `<strong>Desglose para ${total}g:</strong><br>${textoDesgloseGlobal}`;
    }

    function guardarReceta() {
        const nombre = document.getElementById('nombreReceta').value;
        const mat = document.getElementById('tipoMaterial').value;
        if (!nombre) return alert("Ponle nombre a la pieza");

        recetas.push({
            nombre,
            material: mat.toUpperCase(),
            notas: document.getElementById('notas').value,
            peso: document.getElementById('pesoTotal').value,
            desglose: textoDesgloseGlobal
        });

        localStorage.setItem('recetas_final_v3', JSON.stringify(recetas));
        document.getElementById('nombreReceta').value = "";
        dibujarRecetas();
    }

    function dibujarRecetas() {
        const lista = document.getElementById('listaRecetas');
        lista.innerHTML = "<h3>📚 Mis Piezas Guardadas</h3>";
        recetas.forEach((r, i) => {
            lista.innerHTML += `
                <div class="receta-card">
                    <strong>${r.nombre}</strong> (${r.material})<br>
                    <small>${r.notas}</small>
                    <div class="badge-desglose">
                        <strong>Peso Total: ${r.peso}g</strong><br>
                        ${r.desglose}
                    </div>
                    <button onclick="borrar(${i})" style="color:red; border:none; background:none; cursor:pointer; font-size:10px;">Eliminar</button>
                </div>`;
        });
    }

    function borrar(i) {
        recetas.splice(i, 1);
        localStorage.setItem('recetas_final_v3', JSON.stringify(recetas));
        dibujarRecetas();
    }

    window.onload = dibujarRecetas;
</script>
</body>
</html>
