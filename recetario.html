<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recetario Lunavia & Usagi 🕯️</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfbff; padding: 10px; color: #333; }
        .contenedor { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #4b0082; margin-top: 0; }
        .seccion { background: #f3e5f5; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #e1bee7; }
        label { font-weight: bold; font-size: 13px; display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; color: white; transition: 0.3s; }
        .btn-save { background: #4caf50; box-shadow: 0 4px 6px rgba(76, 175, 80, 0.2); }
        .btn-save:active { transform: scale(0.98); }
        .btn-backup { background: #607d8b; font-size: 11px; margin-top: 20px; }
        .receta-card { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 12px; margin-top: 10px; border-left: 5px solid #9c27b0; position: relative; }
        .resultado-box { background: #fff; padding: 10px; border-radius: 10px; margin-top: 10px; border: 1px dashed #9c27b0; text-align: center; }
        .badge { background: #f9f9f9; padding: 8px; border-radius: 8px; margin-top: 8px; font-size: 12px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="contenedor">
    <h2>📖 Recetario de Velas Pro</h2>

    <div class="seccion">
        <strong>🧪 1. Calcular Mezcla Exacta</strong>
        <label>Peso total de la vela terminada (g):</label>
        <input type="number" id="pesoTotal" placeholder="Ej. 150" oninput="calcularMezcla()">
        
        <label>% de Esencia deseado:</label>
        <select id="porcEsencia" onchange="calcularMezcla()">
            <option value="0.08">8% (Fragancia Estándar)</option>
            <option value="0.10">10% (Fragancia Fuerte)</option>
            <option value="0.12">12% (Máximo permitido)</option>
        </select>

        <div class="resultado-box" id="resultadoCalculo">
            Coloca el peso para ver el desglose...
        </div>
    </div>

    <div class="seccion" style="background: #e8f5e9; border-color: #c8e6c9;">
        <strong>📝 2. Guardar en mi Libro</strong>
        <input type="text" id="nombreReceta" placeholder="Nombre (Ej: Vela Lavanda Relax)">
        <input type="text" id="tipoCera" placeholder="Tipo de cera (Ej: Soja A-27)">
        <input type="text" id="aroma" placeholder="Aroma / Fragancia">
        <button class="btn btn-save" onclick="guardarReceta()">💾 Guardar Receta con este Cálculo</button>
    </div>

    <div id="listaRecetas"></div>

    <button class="btn btn-backup" onclick="exportarRecetas()">📥 Descargar Respaldo (Guardar mis recetas)</button>
    
    <div style="text-align:center; margin-top:20px;">
        <a href="index.html" style="color:#9c27b0; text-decoration:none; font-weight:bold; font-size:13px;">⬅ Volver al Menú Principal</a>
    </div>
</div>

<script>
    // Usamos v2 para asegurar que no haya choques de datos anteriores
    let recetas = JSON.parse(localStorage.getItem('recetas_velas_v2')) || [];
    let ultimoCera = 0;
    let ultimoEsencia = 0;

    function calcularMezcla() {
        const peso = parseFloat(document.getElementById('pesoTotal').value) || 0;
        const porc = parseFloat(document.getElementById('porcEsencia').value);
        
        if (peso > 0) {
            // Fórmula técnica: Cera = Peso / (1 + %) | Esencia = Peso - Cera
            ultimoCera = peso / (1 + porc);
            ultimoEsencia = peso - ultimoCera;

            document.getElementById('resultadoCalculo').innerHTML = `
                <div style="color:#4b0082; font-weight:bold;">Receta para ${peso}g:</div>
                <div style="font-size: 18px; margin-top:5px;">🕯️ Cera: <strong>${ultimoCera.toFixed(1)}g</strong></div>
                <div style="font-size: 18px;">💧 Esencia: <strong>${ultimoEsencia.toFixed(1)}g</strong></div>
            `;
        } else {
            document.getElementById('resultadoCalculo').innerText = "Coloca el peso para ver el desglose...";
            ultimoCera = 0;
            ultimoEsencia = 0;
        }
    }

    function guardarReceta() {
        const nombre = document.getElementById('nombreReceta').value.trim();
        const ceraTipo = document.getElementById('tipoCera').value.trim();
        const aroma = document.getElementById('aroma').value.trim();
        const pesoTotal = document.getElementById('pesoTotal').value;

        if (!nombre) return alert("⚠️ Ponle un nombre a tu vela");

        // Guardamos el objeto con el desglose calculado en tiempo real
        recetas.push({ 
            nombre, 
            ceraTipo, 
            aroma, 
            pesoTotal: pesoTotal || "0",
            gramosCera: ultimoCera.toFixed(1),
            gramosEsencia: ultimoEsencia.toFixed(1)
        });

        localStorage.setItem('recetas_velas_v2', JSON.stringify(recetas));
        
        // Limpiar campos
        document.getElementById('nombreReceta').value = "";
        alert("✨ ¡Vela guardada con su fórmula exacta!");
        dibujarRecetas();
    }

    function dibujarRecetas() {
        const contenedor = document.getElementById('listaRecetas');
        contenedor.innerHTML = "<h3>📚 Mis Recetas Guardadas</h3>";
        
        if(recetas.length === 0) {
            contenedor.innerHTML += "<p style='color:#888; font-size:12px;'>Aún no tienes recetas guardadas.</p>";
        }

        recetas.forEach((r, i) => {
            contenedor.innerHTML += `
                <div class="receta-card">
                    <strong style="color:#4b0082; font-size: 16px;">${r.nombre}</strong><br>
                    <small>🌸 Aroma: ${r.aroma}</small><br>
                    <small>🕯️ Cera: ${r.ceraTipo}</small>
                    
                    <div class="badge">
                        <strong>Fórmula para ${r.pesoTotal}g:</strong><br>
                        • ${r.gramosCera}g de cera<br>
                        • ${r.gramosEsencia}g de esencia
                    </div>

                    <div style="text-align:right; margin-top:5px;">
                        <button onclick="borrarReceta(${i})" style="color:red; border:none; background:none; cursor:pointer; font-size:11px;">Eliminar ✕</button>
                    </div>
                </div>
            `;
        });
    }

    function borrarReceta(i) {
        if (confirm("¿Segura que quieres eliminar esta receta?")) {
            recetas.splice(i, 1);
            localStorage.setItem('recetas_velas_v2', JSON.stringify(recetas));
            dibujarRecetas();
        }
    }

    function exportarRecetas() {
        if (recetas.length === 0) return alert("No hay recetas para respaldar.");
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(recetas));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "respaldo_recetas_lunavia.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    window.onload = dibujarRecetas;
</script>

</body>
</html>
