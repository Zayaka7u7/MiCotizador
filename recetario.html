<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recetario Maestro Lunavia 🌙</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; padding: 15px; color: #333; }
        .contenedor { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #388e3c; margin-top: 0; }
        .seccion { background-color: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #eee; }
        h3 { font-size: 16px; margin-top: 0; border-bottom: 2px solid #ddd; padding-bottom: 5px; color: #555;}
        label { font-weight: bold; font-size: 13px; display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .pestanas { display: flex; gap: 10px; margin-bottom: 20px; background: #eee; padding: 5px; border-radius: 10px;}
        .btn-pestana { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #555; background: transparent; }
        .pestana-activa { background-color: #388e3c; color: white; }
        .zona-guardar { background: #e8f5e9; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed #4CAF50;}
        .btn { padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; width: 100%; margin-top: 10px;}
        .btn-guardar { background-color: #4CAF50; }
        .fila-ingrediente { display: flex; gap: 10px; align-items: center; margin-top: 10px; background: #fff; padding: 10px; border-radius: 5px; border: 1px dashed #ccc;}
        .resultados { background-color: #fff9e6; padding: 15px; border-radius: 8px; border: 2px solid #ffc107; margin-top: 15px; }
        .res-total { text-align: center; font-size: 18px; font-weight: bold; color: #b8860b; border-bottom: 2px dashed #ffe082; padding-bottom: 10px;}
        .res-item { display: flex; justify-content: space-between; font-size: 16px; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="contenedor">
        <h2>🧪 Recetario Exacto</h2>

        <div class="pestanas">
            <button id="btn-vaciados" class="btn-pestana pestana-activa" onclick="cambiarPestana('vaciados')">🔮 Vaciados</button>
            <button id="btn-tricotin" class="btn-pestana" onclick="cambiarPestana('tricotin')">🧶 Tricotín</button>
        </div>

        <div id="seccion-vaciados">
            <div class="zona-guardar">
                <h3 style="color: #2e7d32;">💾 Guardar Nuevo Molde</h3>
                <label>Nombre del Molde:</label>
                <input type="text" id="nuevoNombre" placeholder="Ej. Maceta Hexagonal">
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;"><label>Peso Vacío (g):</label><input type="number" id="nuevoVacio"></div>
                    <div style="flex: 1;"><label>Peso c/Agua (g):</label><input type="number" id="nuevoLleno"></div>
                </div>
                <label>¿Qué material usarás?</label>
                <select id="nuevoMaterial">
                    <option value="velas">🕯️ Cera (x 0.9)</option>
                    <option value="resina">🔮 Resina (x 1.1)</option>
                    <option value="yeso">🪴 Yeso (x 1.3)</option>
                </select>
                <button class="btn btn-guardar" onclick="guardarMolde()">Guardar en Memoria</button>
            </div>

            <div class="seccion">
                <h3>1. Seleccionar Molde Guardado</h3>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <select id="selectMoldes" onchange="seleccionarMolde()" style="flex-grow: 1;"></select>
                    <button id="btnEliminar" onclick="eliminarMolde()" style="display:none; background:none; border:none; font-size:20px; cursor:pointer;">🗑️</button>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <div style="flex: 1;"><label>Cant. piezas:</label><input type="number" id="cantPiezas" value="1" onchange="calcularReceta()" onkeyup="calcularReceta()"></div>
                    <div style="flex: 1;"><label>Peso Final (g):</label><input type="number" id="pesoPieza" readonly style="background:#eee;"></div>
                </div>
            </div>

            <div class="seccion">
                <h3>2. Fórmula Seleccionada</h3>
                <div id="lista-ingredientes"></div>
            </div>

            <div class="resultados">
                <div class="res-total">Total a preparar: <span id="mezclaTotal">0</span> gr</div>
                <div id="resultados-pesos"></div>
            </div>
        </div>

        <div id="seccion-tricotin" style="display: none;">
            <div class="seccion">
                <h3>🧶 Medidas Tricotín</h3>
                <label>CM de la figura terminada:</label>
                <input type="number" id="cmLineales" value="10" onchange="calcularTricotin()" onkeyup="calcularTricotin()">
                <label style="margin-top:15px; display:flex; align-items:center;">
                    <input type="checkbox" id="usaAlambre" checked onchange="calcularTricotin()" style="width:auto; margin-right:10px;"> ¿Lleva alambre?
                </label>
            </div>
            <div class="resultados" style="background:#fff0f5; border-color:#ff9a9e;">
                <div class="res-item"><span>🧶 Cordón ya tejido:</span><span id="res-hilo" style="font-weight:bold;">0 cm</span></div>
                <div id="div-alambre" class="res-item"><span>📎 Alambre:</span><span id="res-alambre" style="font-weight:bold;">0 cm</span></div>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 20px;"><a href="index.html" style="color:#666; text-decoration:none; font-weight:bold;">⬅ Menú Principal</a></div>
    </div>

    <script>
        // LEER MEMORIA (Intentamos leer ambos nombres por si acaso)
        let moldes = JSON.parse(localStorage.getItem('misMoldesG')) || [];

        const formulas = {
            velas: [{n:"Cera", p:90}, {n:"Estearina", p:10}, {n:"Esencia (Extra)", p:8, ex:true}],
            resina: [{n:"Parte A", p:50}, {n:"Parte B", p:50}],
            yeso: [{n:"Yeso", p:75}, {n:"Agua", p:25}]
        };

        function cambiarPestana(p) {
            document.getElementById('seccion-vaciados').style.display = p === 'vaciados' ? 'block' : 'none';
            document.getElementById('seccion-tricotin').style.display = p === 'tricotin' ? 'block' : 'none';
            document.getElementById('btn-vaciados').className = p === 'vaciados' ? 'btn-pestana pestana-activa' : 'btn-pestana';
            document.getElementById('btn-tricotin').className = p === 'tricotin' ? 'btn-pestana pestana-activa' : 'btn-pestana';
        }

        function guardarMolde() {
            const n = document.getElementById('nuevoNombre').value;
            const v = parseFloat(document.getElementById('nuevoVacio').value);
            const l = parseFloat(document.getElementById('nuevoLleno').value);
            const t = document.getElementById('nuevoMaterial').value;
            if(n && l > v) {
                let m = (l-v) * (t==='velas'?0.9 : t==='resina'?1.1 : 1.3);
                // Guardamos con el nombre de propiedad correcto: "pesoFinal"
                moldes.push({nombre:n, tipo:t, pesoFinal:Math.round(m)});
                localStorage.setItem('misMoldesG', JSON.stringify(moldes));
                actualizarSelect();
                alert("¡Molde guardado con éxito! ✨");
                document.getElementById('nuevoNombre').value = '';
            }
        }

        function actualizarSelect() {
            const s = document.getElementById('selectMoldes');
            s.innerHTML = '<option value="">Elige un molde...</option>';
            
            moldes.forEach((m, i) => {
                // Buscamos el peso correcto
                let p = m.pesoFinal || m.peso || 0;
                
                // Elegimos el emoji según el material guardado
                let emoji = "✨"; // Uno por si acaso
                if (m.tipo === "velas") emoji = "🕯️";
                if (m.tipo === "yeso") emoji = "🪴";
                if (m.tipo === "resina") emoji = "🔮";
                
                // Lo ponemos en la lista con su emoji
                s.innerHTML += `<option value="${i}">${emoji} ${m.nombre} (${p}g)</option>`;
            });
        }

        function seleccionarMolde() {
            const i = document.getElementById('selectMoldes').value;
            const btn = document.getElementById('btnEliminar');
            if(i !== "") {
                const m = moldes[i];
                document.getElementById('pesoPieza').value = m.pesoFinal || m.peso;
                btn.style.display = "block";
                dibujarIngredientes(m.tipo || 'velas');
            } else {
                btn.style.display = "none";
                document.getElementById('lista-ingredientes').innerHTML = "";
            }
        }

        function eliminarMolde() {
            const i = document.getElementById('selectMoldes').value;
            if(confirm("¿Seguro que quieres borrar este molde de tu memoria? 🙊")) {
                moldes.splice(i, 1);
                localStorage.setItem('misMoldesG', JSON.stringify(moldes));
                actualizarSelect();
                document.getElementById('pesoPieza').value = "";
                document.getElementById('btnEliminar').style.display = "none";
                document.getElementById('lista-ingredientes').innerHTML = "";
            }
        }

        function dibujarIngredientes(t) {
            const cont = document.getElementById('lista-ingredientes');
            cont.innerHTML = '';
            formulas[t].forEach((ing, index) => {
                cont.innerHTML += `
                    <div class="fila-ingrediente">
                        <span style="flex:2;">${ing.n}</span>
                        <input style="flex:1;" type="number" id="perc-${index}" value="${ing.p}" onchange="calcularReceta()"> %
                    </div>`;
            });
            calcularReceta();
        }

        function calcularReceta() {
            const i = document.getElementById('selectMoldes').value;
            if(i === "") return;
            const t = moldes[i].tipo || 'velas';
            const cant = document.getElementById('cantPiezas').value;
            const peso = document.getElementById('pesoPieza').value;
            const totalMezcla = cant * peso;
            document.getElementById('mezclaTotal').innerText = totalMezcla.toFixed(1);

            const resCont = document.getElementById('resultados-pesos');
            resCont.innerHTML = '';
            
            formulas[t].forEach((ing, index) => {
                let p = parseFloat(document.getElementById('perc-'+index).value);
                let gramos = totalMezcla * (p / 100);
                resCont.innerHTML += `<div class="res-item"><span>${ing.n}:</span><span style="font-weight:bold; color:#d32f2f;">${gramos.toFixed(1)} g</span></div>`;
            });
        }

        function calcularTricotin() {
            const cm = parseFloat(document.getElementById('cmLineales').value) || 0;
            document.getElementById('res-hilo').innerText = (cm + 2) + " cm";
            document.getElementById('res-alambre').innerText = (cm + 2) + " cm";
            document.getElementById('div-alambre').style.display = document.getElementById('usaAlambre').checked ? 'flex' : 'none';
        }

        actualizarSelect();
    </script>
</body>
</html>
