<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Lunavia & Usagi 🌙🐰</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 10px; color: #333; }
        .contenedor { max-width: 450px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #4b0082; margin-top: 0; }
        .seccion { background: #fdfbff; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 15px; }
        label { font-weight: bold; font-size: 12px; display: block; margin-top: 8px; }
        input, select { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; width: 100%; margin-top: 10px; }
        
        /* Estilos TikTok Shop */
        .tt-container { background: #000; color: #fff; padding: 15px; border-radius: 20px; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .tt-input { background: #222 !important; color: #fff !important; border: 1px solid #444 !important; }
        .tt-resumen { background: #111; padding: 10px; border-radius: 10px; font-size: 13px; margin-top: 10px; }
        
        .item-lista { background:#fff; padding:5px; margin-bottom:5px; border-radius:5px; border:1px solid #ddd; display:flex; justify-content:space-between; font-size:11px; }
    </style>
</head>
<body>

    <div class="contenedor">
        <h2>🧮 Calculadora de Producción</h2>

        <div class="seccion">
            <strong>📦 Registrar Insumo</strong>
            <div style="display: flex; gap: 5px;">
                <select id="catInsumo" style="width: 70px;">
                    <option>🕯️</option>
                    <option>🧶</option>
                    <option>🪴</option>
                    <option>🔑</option>
                </select>
                <input type="text" id="nombreMat" placeholder="Nombre (ej. Cera soja)" style="flex:1;">
            </div>
            <div style="display: flex; gap: 5px;">
                <input type="number" id="costoMat" placeholder="Costo $">
                <input type="number" id="cantMat" placeholder="Cantidad">
                <select id="unidadMat" style="width: 80px;">
                    <option value="gr">gr</option>
                    <option value="kg">kg</option>
                    <option value="ml">ml</option>
                    <option value="L">L</option>
                    <option value="m">m</option>
                    <option value="pza">pza</option>
                </select>
            </div>
            <button class="btn" style="background: #9c27b0;" onclick="guardarInsumo()">💾 Guardar Insumo</button>
        </div>

        <div class="seccion" style="background: #fff3e0;">
            <strong>🧪 Calcular Costo de Pieza</strong>
            <select id="selectInsumo" onchange="document.getElementById('usoCant').focus()"></select>
            <div style="display: flex; gap: 5px; margin-top: 10px;">
                <input type="number" id="usoCant" placeholder="¿Cuánto usaste?">
                <button class="btn" style="background: #ff9800; margin-top: 4px;" onclick="sumarPieza()">➕ Sumar</button>
            </div>
            <div id="resumen" style="font-size: 12px; margin-top: 10px; color: #555;"></div>
        </div>

        <div class="seccion">
            <label>Ganancia deseada (%):</label>
            <input type="number" id="porcGanancia" value="50" oninput="calcularVenta()">
            
            <div style="margin-top: 15px; font-size: 14px;">
                Costo Producción: <strong>$<span id="totalProduccion">0.00</span></strong><br>
                Precio sugerido: <strong style="color: green; font-size: 18px;">$<span id="totalVenta">0.00</span></strong>
            </div>

            <input type="text" id="nombreProdFinal" placeholder="Nombre del producto final" style="margin-top: 10px;">
            <button class="btn" style="background: #4caf50;" onclick="guardarParaCotizador()">✨ Guardar para Cotizador</button>
            
            <button onclick="resetearCalculoActual()" style="background:#757575; color:white; width:100%; padding:10px; border:none; border-radius:10px; font-weight:bold; margin-top:10px; cursor:pointer;">
                🧹 Borrar y Empezar otro
            </button>
        </div>

        <div class="tt-container">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 24px;">🖤</span>
                <strong style="font-size: 16px;">Simulador TikTok Shop</strong>
            </div>
            <label style="color: #bbb; font-size: 11px;">Precio a poner en TikTok:</label>
            <input type="number" id="precioTikTokManual" placeholder="$0.00" oninput="calcularTikTokIndependiente()" class="tt-input">

            <div class="tt-resumen">
                <div style="display: flex; justify-content: space-between;">
                    <span>Cargos e Impuestos (23.1%):</span>
                    <span style="color: #ff4550;">-$<span id="ttComisionIndep">0.00</span></span>
                </div>
                <hr style="border: 0; border-top: 1px solid #333; margin: 8px 0;">
                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 16px;">
                    <span>Recibes neto:</span>
                    <span style="color: #00f2ea;">$<span id="ttGananciaIndep">0.00</span></span>
                </div>
            </div>
        </div>

        <div style="text-align: center; margin-top: 20px;"><a href="index.html" style="color:#666; text-decoration:none; font-weight:bold;">⬅ Menú Principal</a></div>
        
        <div id="lista-insumos" style="margin-top: 20px; opacity: 0.6;">
            </div>
    </div>

    <script>
        let acumulado = 0;

        function obtenerInsumos() { return JSON.parse(localStorage.getItem('insumos_v3')) || []; }

        function guardarInsumo() {
            const cat = document.getElementById('catInsumo').value;
            const nom = document.getElementById('nombreMat').value.trim();
            const cos = parseFloat(document.getElementById('costoMat').value) || 0;
            const can = parseFloat(document.getElementById('cantMat').value) || 0;
            const uni = document.getElementById('unidadMat').value;

            if (nom === "" || can <= 0) { alert("⚠️ Pon nombre y cantidad"); return; }

            let precioU;
            if(uni === 'kg' || uni === 'L' || uni === 'm') {
                precioU = cos / (can * (uni === 'm' ? 100 : 1000));
            } else { precioU = cos / can; }

            const uniUso = (uni === 'kg') ? 'gr' : (uni === 'L') ? 'ml' : (uni === 'm') ? 'cm' : uni;
            let lista = obtenerInsumos();
            lista.push({ nombre: cat + " " + nom, unidad: uniUso, precio: precioU });
            localStorage.setItem('insumos_v3', JSON.stringify(lista));
            document.getElementById('nombreMat').value = "";
            dibujarTodo();
        }

        function dibujarTodo() {
            const div = document.getElementById('lista-insumos');
            const sel = document.getElementById('selectInsumo');
            const lista = obtenerInsumos();
            div.innerHTML = "<strong>📦 Mis Materiales Base:</strong><br>";
            sel.innerHTML = '<option value="">-- Elige Material --</option>';
            lista.forEach((item, i) => {
                div.innerHTML += `<div class="item-lista">
                    <span>${item.nombre} ($${item.precio.toFixed(3)} / ${item.unidad})</span>
                    <button onclick="borrar(${i})" style="color:red; border:none; background:none;">X</button>
                </div>`;
                let opt = document.createElement("option");
                opt.value = i; opt.text = item.nombre; sel.add(opt);
            });
        }

        function borrar(i) {
            let lista = obtenerInsumos();
            lista.splice(i, 1);
            localStorage.setItem('insumos_v3', JSON.stringify(lista));
            dibujarTodo();
        }

        function sumarPieza() {
            const i = document.getElementById('selectInsumo').value;
            const cant = parseFloat(document.getElementById('usoCant').value) || 0;
            const lista = obtenerInsumos();
            if(i !== "" && cant > 0) {
                const ins = lista[i];
                const costoItem = ins.precio * cant;
                acumulado += costoItem;
                document.getElementById('resumen').innerHTML += `<div>• ${ins.nombre}: $${costoItem.toFixed(2)}</div>`;
                calcularVenta();
                document.getElementById('usoCant').value = "";
            }
        }

        function calcularVenta() {
            const porc = parseFloat(document.getElementById('porcGanancia').value) || 0;
            const venta = acumulado + (acumulado * (porc / 100));
            document.getElementById('totalProduccion').innerText = acumulado.toFixed(2);
            document.getElementById('totalVenta').innerText = venta.toFixed(2);
        }

        function calcularTikTokIndependiente() {
            const precioManual = parseFloat(document.getElementById('precioTikTokManual').value) || 0;
            const comision = precioManual * 0.2305; // 23.05% de cargos totales
            const neto = precioManual - comision;
            document.getElementById('ttComisionIndep').innerText = comision.toFixed(2);
            document.getElementById('ttGananciaIndep').innerText = neto.toFixed(2);
        }

        function resetearCalculoActual() {
            if(confirm("¿Segura que quieres borrar el cálculo actual?")) {
                acumulado = 0;
                document.getElementById('resumen').innerHTML = "";
                document.getElementById('totalProduccion').innerText = "0.00";
                document.getElementById('totalVenta').innerText = "0.00";
                document.getElementById('nombreProdFinal').value = "";
                alert("🧹 ¡Listo para un nuevo producto!");
            }
        }

        function guardarParaCotizador() {
            const nomFinal = document.getElementById('nombreProdFinal').value.trim();
            const precioV = document.getElementById('totalVenta').innerText;
            if(!nomFinal) { alert("⚠️ Ponle nombre al producto"); return; }
            let prods = JSON.parse(localStorage.getItem('productosLunavia')) || [];
            prods.push({ nombre: nomFinal, costoBase: precioV }); 
            localStorage.setItem('productosLunavia', JSON.stringify(prods));
            alert("✨ ¡Guardado para Cotizador!");
            location.reload(); 
        }

        window.onload = dibujarTodo;
    </script>
</body>
</html>
