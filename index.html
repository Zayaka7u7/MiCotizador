<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Herramientas Mágicas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; text-align: center;
            padding: 20px 0;
        }
        h1 { color: #333; margin-bottom: 20px; font-size: 26px;}
        .contenedor-botones {
            width: 90%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .boton-menu {
            display: block; 
            padding: 16px; 
            border-radius: 15px; 
            text-decoration: none; 
            color: white; 
            font-size: 16px; 
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
            transition: transform 0.2s, box-shadow 0.2s;
        }
        /* Colores de las Marcas y Herramientas */
        .btn-cotizador { background: linear-gradient(135deg, #ffb6c1, #b03060); } /* Usagi Pink */
        .btn-calculadora { background: linear-gradient(135deg, #d8bfd8, #4b0082); } /* Lunavia Purple */
        .btn-recetario { background: linear-gradient(135deg, #a8e6cf, #388e3c); } /* Green */
        .btn-gestor { background: linear-gradient(135deg, #ffd194, #ff9244); } /* Orange */
        .btn-copys { background: linear-gradient(135deg, #89f7fe, #66a6ff); } /* Blue */
        .btn-pdv { background: linear-gradient(135deg, #f093fb, #f5576c); } /* PDV Pink/Red */

        .boton-menu:active { transform: scale(0.95); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        .footer { margin-top: 30px; font-size: 12px; color: #888; }
    </style>
</head>

</div>
