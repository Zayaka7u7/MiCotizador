<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - Lunavia & Usagi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        h1 {
            color: #5d5c61;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-align: center;
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 800px;
            padding: 20px;
        }

        .btn {
            background-color: #ffffff;
            color: #5d5c61;
            text-decoration: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid transparent;
        }

        .btn:hover {
            background-color: #e2e2e7;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            border-color: #a3a2a8;
        }

        /* Color especial para Punto de Venta 💰 */
        .btn-pdv {
            background-color: #d4edda;
            color: #155724;
            border-color: #c3e6cb;
        }
        .btn-pdv:hover {
            background-color: #c3e6cb;
            border-color: #bee5eb;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>

        <a href="pdv.html" class="btn btn-pdv">💰 Punto de Venta</a>
        <a href="recetario.html" class="btn">🕯️ Recetario Lunavia</a>
        <a href="lista_compras.html" class="btn">🛒 Lista de Compras</a>
        <a href="gestor.html" class="btn">📊 Gestor de Inventario</a>
        <a href="copys.html" class="btn">✍️ Generador de Copys</a>
        <a href="bazar.html" class="btn">🎪 Control de Bazares</a>
    </div>

    <div class="footer">
        🐰 Usagi | 🌙 Lunavia | 🦄 Zombie Unicorn
    </div>

</body>
</html>
